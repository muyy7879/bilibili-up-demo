<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B站 UP 更新监控</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f0f2f5;
      color: #222;
    }

    .header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      color: #888;
      font-size: 14px;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      overflow: hidden;
      display: block;
      transition: transform 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .card-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
    }

    .up-name {
      font-size: 14px;
      color: #fb7299;
      font-weight: bold;
      text-decoration: none;
    }

    .badge {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge-new {
      background: #e8fff0;
      color: #0a7a35;
    }

    .badge-normal {
      background: #f3f3f3;
      color: #999;
    }

    .badge-error {
      background: #fff3f3;
      color: #cc3333;
    }

    .badge-warning {
      background: #fff8e1;
      color: #ff8f00;
    }

    .video-title {
      font-size: 16px;
      font-weight: bold;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .video-title a {
      color: #222;
      text-decoration: none;
    }

    .video-title a:hover {
      color: #fb7299;
    }

    .card-meta {
      font-size: 12px;
      color: #999;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 16px;
    }

    .error-msg {
      text-align: center;
      padding: 60px;
      color: #cc3333;
    }

    .footer {
      text-align: center;
      padding: 30px 0;
      color: #bbb;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>B站 UP 更新监控</h1>
    <p>每 3 小时自动检查一次 · 由本地服务驱动</p>
  </div>

  <div id="app" class="card-list">
    <div class="loading">正在加载数据...</div>
  </div>

  <div class="footer">
    数据来源：Bilibili · 托管于 GitHub Pages
  </div>

  <script>
    // UTC 时间转北京时间 (CST, UTC+8)
    function utcToBeijing(utcTime) {
      if (!utcTime) return '-';
      try {
        // 处理可能的格式: "2026-07-07 08:35:04 UTC"
        const date = new Date(utcTime.replace(' UTC', '') + 'Z');
        return date.toLocaleString('zh-CN', {
          timeZone: 'Asia/Shanghai',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }).replace(/\//g, '-');
      } catch (e) {
        return utcTime; // 如果转换失败，返回原始时间
      }
    }

    fetch('./data/latest.json?t=' + Date.now())
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(data => {
        const app = document.getElementById('app');
        const uids = Object.keys(data);

        if (uids.length === 0) {
          app.innerHTML = '<div class="loading">暂无数据，请先运行检查脚本</div>';
          return;
        }

        // 按是否有新视频和是否失败排序
        uids.sort((a, b) => {
          const aNew = data[a].is_new ? 2 : 0;
          const bNew = data[b].is_new ? 2 : 0;
          const aError = data[a].fetch_error ? 1 : 0;
          const bError = data[b].fetch_error ? 1 : 0;
          return (bNew + bError) - (aNew + aError);
        });

        let html = '';

        uids.forEach(uid => {
          const up = data[uid];

          let badgeClass = 'badge-normal';
          let badgeText = '暂无更新';

          if (up.fetch_error) {
            // 如果有旧数据，显示警告而不是错误
            if (up.title && up.title !== '') {
              badgeClass = 'badge-warning';
              badgeText = '检查失败，展示旧数据';
            } else {
              badgeClass = 'badge-error';
              badgeText = '获取失败';
            }
          } else if (up.is_new) {
            badgeClass = 'badge-new';
            badgeText = '新视频';
          }

          const spaceUrl = `https://space.bilibili.com/${up.uid}`;

          html += `
            <div class="card">
              <div class="card-body">
                <div>
                  <div class="card-top">
                    <a class="up-name" href="${spaceUrl}" target="_blank">
                      ${up.name || 'UID: ' + up.uid}
                    </a>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                  </div>
                  <div class="video-title">
                    <a href="${up.link || '#'}" target="_blank">
                      ${up.title || '暂无视频信息'}
                    </a>
                  </div>
                </div>
                <div class="card-meta">
                  <span>发布：${utcToBeijing(up.pub_date) || '-'}</span>
                  <span>检查：${utcToBeijing(up.checked_at) || '-'}</span>
                </div>
              </div>
            </div>
          `;
        });

        app.innerHTML = html;
      })
      .catch(err => {
        document.getElementById('app').innerHTML =
          `<div class="error-msg">数据加载失败：${err.message}<br>请确认 data/latest.json 文件存在</div>`;
      });
  </script>
</body>
</html>
